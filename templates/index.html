<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mail Viewer</title>

<style>
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6f8; }
header { position: sticky; top: 0; background: #fff; padding: 14px 20px; border-bottom: 1px solid #e0e0e0; display: flex; gap: 10px; align-items: center; }
input, button { padding: 6px 10px; font-size: 14px; }

#mail-list { padding: 20px; }
.mail-item { display: flex; justify-content: space-between; background: #fff; margin-bottom: 8px; padding: 14px 16px; border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; }
.mail-item:hover { background: #f0f4ff; }

.mail-left { flex: 1; }
.subject { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.meta { font-size: 12px; color: #666; }
.mail-date { font-size: 16px; font-weight: 600; white-space: nowrap; }

#pagination { text-align: center; margin: 20px; }

#mail-detail { display: none; padding: 30px; background: #fff; }
.back-btn { margin-bottom: 20px; }
</style>
</head>

<body>

<header id="main-header">
<input type="text" id="search" placeholder="検索">
<input type="date" id="dateFrom">
<input type="date" id="dateTo">
<button onclick="loadMails(1)">検索</button>
</header>

<div id="list-view">
    <div id="mail-list"></div>
    <div id="pagination"></div>
</div>

<div id="mail-detail">
    <button class="back-btn" onclick="history.back()">← 一覧へ戻る</button>
    <h2 id="detail-subject"></h2>
    <div id="detail-meta" class="meta"></div>
    <hr>
    <div id="detail-body"></div>
</div>

<script>

function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        q: params.get("q") || "",
        from: params.get("from") || "",
        to: params.get("to") || "",
        page: parseInt(params.get("page") || "1"),
        mail: params.get("mail")
    };
}

function updateURL(params) {
    const urlParams = new URLSearchParams(params);
    history.pushState(params, "", "?" + urlParams.toString());
}

function loadMails(page) {
    const q = document.getElementById("search").value;
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;

    updateURL({ q, from, to, page });

    fetch(`/api/mails?page=${page}&q=${encodeURIComponent(q)}&from=${from}&to=${to}`)
        .then(res => res.json())
        .then(data => {
            renderList(data.mails);
            renderPagination(data.page, data.total_pages);
            showList();
        });
}

function renderList(mails) {
    const list = document.getElementById("mail-list");
    list.innerHTML = "";

    mails.forEach(mail => {
        const div = document.createElement("div");
        div.className = "mail-item";

        div.innerHTML = `
            <div class="mail-left">
                <div class="subject">${mail.subject}</div>
                <div class="meta">${mail.sender}</div>
            </div>
            <div class="mail-date">${mail.date}</div>
        `;

        div.onclick = () => openMail(mail.id);
        list.appendChild(div);
    });
}

function renderPagination(page, totalPages) {
    const container = document.getElementById("pagination");
    container.innerHTML = `
        <button onclick="loadMails(${page - 1})" ${page <= 1 ? "disabled" : ""}>前へ</button>
        <span> ${page} / ${totalPages} </span>
        <button onclick="loadMails(${page + 1})" ${page >= totalPages ? "disabled" : ""}>次へ</button>
    `;
}

function openMail(id) {
    const params = getParams();
    updateURL({ ...params, mail: id });

    fetch(`/api/mail/${id}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("detail-subject").innerText = data.subject;
            document.getElementById("detail-meta").innerText = data.sender + " | " + data.date;

            if (data.body_html) {
                document.getElementById("detail-body").innerHTML = data.body_html;
            } else {
                document.getElementById("detail-body").innerText = data.body_text;
            }

            showDetail();
        });
}

function showDetail() {
    document.getElementById("list-view").style.display = "none";
    document.getElementById("main-header").style.display = "none";
    document.getElementById("mail-detail").style.display = "block";
}

function showList() {
    document.getElementById("mail-detail").style.display = "none";
    document.getElementById("list-view").style.display = "block";
    document.getElementById("main-header").style.display = "flex";
}

window.onpopstate = function() {
    const params = getParams();

    document.getElementById("search").value = params.q;
    document.getElementById("dateFrom").value = params.from;
    document.getElementById("dateTo").value = params.to;

    if (params.mail) {
        openMail(params.mail);
    } else {
        loadMails(params.page || 1);
    }
};

window.onload = function() {
    const params = getParams();

    document.getElementById("search").value = params.q;
    document.getElementById("dateFrom").value = params.from;
    document.getElementById("dateTo").value = params.to;

    if (params.mail) {
        openMail(params.mail);
    } else {
        loadMails(params.page || 1);
    }
};
</script>

</body>
</html>
