<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ mail['subject'] }}</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}
.header {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
<h3>{{ mail['subject'] }}</h3>
<div>{{ mail['sender'] }} | {{ mail['date'] }}</div>
</div>

<iframe src="/mail_raw/{{ mail['id'] }}"
        sandbox="allow-same-origin"
        loading="lazy"
        style="width:100%; height:80vh; border:none;">
</iframe>

</body>
</html>
